name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Pipeline: Lint (typecheck) -> Build -> Security Scan.
# Har bir bosqich mustaqil ish (job) sifatida ketma-ket bog'langan.
jobs:
  typecheck:
    name: Lint / Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: TypeScript typecheck
        run: npm run typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Jest
        run: npm test -- --ci

  build:
    name: Build (web)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Export web bundle
        run: npm run build:web
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      # Yangi (to'g'ridan-to'g'ri) high/critical zaifliklarni ko'rsatadi.
      # continue-on-error: mavjud tranzitiv ogohlantirishlar pipeline'ni bloklamasin.
      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true
